name: Deploy Production

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: deploy-production
  cancel-in-progress: true

env:
  VPS_HOST: rebequi.com.br
  VPS_USER: root
  APP_ROOT: /opt/rebequi
  RELEASE_DIR: /opt/rebequi/current
  DEPLOY_PORT: "3190"
  PRIMARY_DOMAIN: rebequi.com.br
  SECONDARY_DOMAIN: www.rebequi.com.br
  SSL_EMAIL: admin@rebequi.com.br

jobs:
  deploy:
    name: Deploy to VPS
    runs-on: ubuntu-latest
    timeout-minutes: 45

    environment:
      name: production
      url: https://www.rebequi.com.br

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install SSH tools
        run: |
          sudo apt-get update
          sudo apt-get install -y sshpass

      - name: Create deploy archive
        run: |
          tar \
            --exclude=.git \
            --exclude=.github \
            --exclude=node_modules \
            --exclude=apps/frontend/dist \
            --exclude=apps/backend/dist \
            --exclude=apps/backend/node_modules \
            --exclude=packages/shared/node_modules \
            -czf /tmp/rebequi-release.tar.gz .

      - name: Upload release to VPS
        env:
          SSHPASS: ${{ secrets.VPS_PASSWORD }}
        run: |
          sshpass -e scp -o StrictHostKeyChecking=no \
            /tmp/rebequi-release.tar.gz \
            "${VPS_USER}@${VPS_HOST}:/tmp/rebequi-release.tar.gz"

      - name: Deploy on VPS
        env:
          SSHPASS: ${{ secrets.VPS_PASSWORD }}
        run: |
          sshpass -e ssh -o StrictHostKeyChecking=no "${VPS_USER}@${VPS_HOST}" <<'REMOTE'
          set -euo pipefail

          APP_ROOT="/opt/rebequi"
          RELEASE_DIR="/opt/rebequi/current"
          DEPLOY_PORT="3190"
          PRIMARY_DOMAIN="rebequi.com.br"
          SECONDARY_DOMAIN="www.rebequi.com.br"
          SSL_EMAIL="admin@rebequi.com.br"
          ARCHIVE="/tmp/rebequi-release.tar.gz"
          SITE_CONF="/etc/nginx/sites-available/rebequi"

          compose() {
            if docker compose version >/dev/null 2>&1; then
              docker compose "$@"
              return
            fi

            if command -v docker-compose >/dev/null 2>&1; then
              docker-compose "$@"
              return
            fi

            echo "docker compose nao encontrado." >&2
            exit 1
          }

          require_command() {
            if ! command -v "$1" >/dev/null 2>&1; then
              echo "Dependencia obrigatoria ausente: $1" >&2
              exit 1
            fi
          }

          dump_diagnostics() {
            echo "=== docker compose ps ==="
            compose -f docker-compose.production.yml ps || true
            echo "=== rebequi-postgres logs ==="
            docker logs rebequi-postgres --tail 100 || true
            echo "=== rebequi-api logs ==="
            docker logs rebequi-api --tail 100 || true
            echo "=== rebequi-web logs ==="
            docker logs rebequi-web --tail 100 || true
            echo "=== nginx site config ==="
            cat "$SITE_CONF" || true
            echo "=== listeners ==="
            ss -tulpn | grep -E ':80 |:443 |:3190 ' || true
          }

          verify_json_health() {
            local url="$1"
            shift
            local body
            body="$(curl -fsSL "$@" "$url")"
            printf '%s' "$body" | grep -q '"status":"ok"'
          }

          verify_frontend_cache_headers() {
            local origin="$1"
            local html_headers
            local html_body
            local asset_path
            local asset_headers

            html_headers="$(curl -fsSI "$origin/")"
            printf '%s' "$html_headers" | grep -qi '^Cache-Control: no-store, no-cache, must-revalidate'

            html_body="$(curl -fsSL "$origin/")"
            asset_path="$(printf '%s' "$html_body" | grep -oE '/assets/[^"]+\.(js|css)' | head -n 1)"

            if [ -z "$asset_path" ]; then
              echo "Nao foi possivel localizar asset versionado no HTML." >&2
              exit 1
            fi

            asset_headers="$(curl -fsSI "${origin}${asset_path}")"
            printf '%s' "$asset_headers" | grep -qi 'Cache-Control: .*immutable'
          }

          assert_container_uses_latest_image() {
            local container_name="$1"
            local image_ref="$2"
            local container_image
            local latest_image

            container_image="$(docker inspect --format '{{.Image}}' "$container_name")"
            latest_image="$(docker image inspect --format '{{.Id}}' "$image_ref")"

            if [ "$container_image" != "$latest_image" ]; then
              echo "Container $container_name nao esta usando a imagem mais recente de $image_ref." >&2
              echo "container_image=$container_image" >&2
              echo "latest_image=$latest_image" >&2
              exit 1
            fi
          }

          wait_for_container_health() {
            local container_name="$1"
            local timeout_seconds="${2:-120}"
            local elapsed="0"

            while [ "$elapsed" -lt "$timeout_seconds" ]; do
              local status
              status="$(docker inspect --format '{{if .State.Health}}{{.State.Health.Status}}{{else}}{{.State.Status}}{{end}}' "$container_name" 2>/dev/null || true)"

              if [ "$status" = "healthy" ] || [ "$status" = "running" ]; then
                return 0
              fi

              sleep 5
              elapsed=$((elapsed + 5))
            done

            echo "Container $container_name nao ficou saudavel a tempo." >&2
            docker logs "$container_name" --tail 100 || true
            exit 1
          }

          require_command docker
          require_command nginx
          require_command certbot
          require_command curl
          require_command openssl
          require_command ss
          require_command tar

          trap 'dump_diagnostics' ERR

          mkdir -p "$APP_ROOT" "$RELEASE_DIR" /var/www/certbot

          find "$RELEASE_DIR" -mindepth 1 -maxdepth 1 ! -name '.env.production' -exec rm -rf {} +
          tar -xzf "$ARCHIVE" -C "$RELEASE_DIR"
          rm -f "$ARCHIVE"

          cd "$RELEASE_DIR"

          read_env_value() {
            local key="$1"
            sed -n "s/^${key}=//p" "$RELEASE_DIR/.env.production" | tail -n 1
          }

          ensure_env_value() {
            local key="$1"
            local value="$2"
            local current_value
            current_value="$(read_env_value "$key")"

            if [ -n "$current_value" ]; then
              return
            fi

            if grep -q "^${key}=" "$RELEASE_DIR/.env.production"; then
              sed -i "s|^${key}=.*|${key}=${value}|" "$RELEASE_DIR/.env.production"
            else
              printf '%s=%s\n' "$key" "$value" >> "$RELEASE_DIR/.env.production"
            fi
          }

          set_env_value() {
            local key="$1"
            local value="$2"

            if grep -q "^${key}=" "$RELEASE_DIR/.env.production"; then
              sed -i "s|^${key}=.*|${key}=${value}|" "$RELEASE_DIR/.env.production"
            else
              printf '%s=%s\n' "$key" "$value" >> "$RELEASE_DIR/.env.production"
            fi
          }

          require_env_value() {
            local key="$1"
            if [ -z "$(read_env_value "$key")" ]; then
              echo "Variavel obrigatoria ausente em .env.production: $key" >&2
              exit 1
            fi
          }

          touch "$RELEASE_DIR/.env.production"
          chmod 600 "$RELEASE_DIR/.env.production"

          POSTGRES_DB_VALUE="$(read_env_value POSTGRES_DB)"
          [ -n "$POSTGRES_DB_VALUE" ] || POSTGRES_DB_VALUE="rebequi"

          POSTGRES_USER_VALUE="$(read_env_value POSTGRES_USER)"
          [ -n "$POSTGRES_USER_VALUE" ] || POSTGRES_USER_VALUE="rebequi"

          POSTGRES_PASSWORD_VALUE="$(read_env_value POSTGRES_PASSWORD)"
          [ -n "$POSTGRES_PASSWORD_VALUE" ] || POSTGRES_PASSWORD_VALUE="$(openssl rand -hex 24)"

          JWT_SECRET_VALUE="$(read_env_value JWT_SECRET)"
          [ -n "$JWT_SECRET_VALUE" ] || JWT_SECRET_VALUE="$(openssl rand -hex 32)"

          ensure_env_value "NODE_ENV" "production"
          ensure_env_value "PORT" "3000"
          ensure_env_value "HOST" "0.0.0.0"
          ensure_env_value "POSTGRES_DB" "$POSTGRES_DB_VALUE"
          ensure_env_value "POSTGRES_USER" "$POSTGRES_USER_VALUE"
          ensure_env_value "POSTGRES_PASSWORD" "$POSTGRES_PASSWORD_VALUE"
          ensure_env_value "DATABASE_URL" "postgresql://${POSTGRES_USER_VALUE}:${POSTGRES_PASSWORD_VALUE}@postgres:5432/${POSTGRES_DB_VALUE}"
          ensure_env_value "JWT_SECRET" "$JWT_SECRET_VALUE"
          ensure_env_value "JWT_EXPIRES_IN" "7d"
          set_env_value "BOOTSTRAP_ADMIN_EMAIL" "admin@rebequi.com.br"
          set_env_value "BOOTSTRAP_ADMIN_PASSWORD" "ChangeMe123!"
          set_env_value "BOOTSTRAP_ADMIN_NAME" "Administrador Rebequi"
          set_env_value "BOOTSTRAP_CUSTOMER_EMAIL" "cliente@rebequi.com.br"
          set_env_value "BOOTSTRAP_CUSTOMER_PASSWORD" "Cliente123!"
          set_env_value "BOOTSTRAP_CUSTOMER_NAME" "Cliente de Teste"
          ensure_env_value "AUTH_COOKIE_NAME" "rebequi_token"
          ensure_env_value "AUTH_COOKIE_SECURE" "true"
          ensure_env_value "AUTH_COOKIE_SAMESITE" "lax"
          ensure_env_value "AUTH_COOKIE_MAX_AGE_MS" "604800000"
          ensure_env_value "AUTH_COOKIE_PATH" "/"
          ensure_env_value "ALLOWED_ORIGINS" "https://rebequi.com.br,https://www.rebequi.com.br"
          ensure_env_value "MAX_FILE_SIZE" "5242880"
          ensure_env_value "UPLOAD_DIR" "./uploads"
          ensure_env_value "LOG_LEVEL" "info"

          require_env_value "POSTGRES_DB"
          require_env_value "POSTGRES_USER"
          require_env_value "POSTGRES_PASSWORD"
          require_env_value "DATABASE_URL"
          require_env_value "JWT_SECRET"

          compose -f docker-compose.production.yml build --pull --no-cache migrator api web
          compose -f docker-compose.production.yml up -d postgres

          wait_for_container_health "rebequi-postgres" 120

          docker rm -f rebequi-migrator >/dev/null 2>&1 || true
          compose -f docker-compose.production.yml run --rm migrator
          compose -f docker-compose.production.yml up -d --force-recreate --remove-orphans api web

          wait_for_container_health "rebequi-api" 120
          wait_for_container_health "rebequi-web" 120
          assert_container_uses_latest_image "rebequi-api" "current-api:latest"
          assert_container_uses_latest_image "rebequi-web" "current-web:latest"
          verify_json_health "http://127.0.0.1:${DEPLOY_PORT}/api/health"
          verify_frontend_cache_headers "http://127.0.0.1:${DEPLOY_PORT}"

          cat > "$SITE_CONF" <<NGINX_HTTP
          server {
              listen 80;
              server_name ${PRIMARY_DOMAIN} ${SECONDARY_DOMAIN};

              location /.well-known/acme-challenge/ {
                  root /var/www/certbot;
              }

              location / {
                  proxy_pass http://127.0.0.1:${DEPLOY_PORT};
                  proxy_http_version 1.1;
                  proxy_set_header Host \$host;
                  proxy_set_header X-Real-IP \$remote_addr;
                  proxy_set_header X-Forwarded-For \$proxy_add_x_forwarded_for;
                  proxy_set_header X-Forwarded-Proto \$scheme;
              }
          }
          NGINX_HTTP

          ln -sf "$SITE_CONF" /etc/nginx/sites-enabled/rebequi
          rm -f /etc/nginx/sites-enabled/default
          nginx -t
          systemctl reload nginx

          verify_json_health "http://127.0.0.1:${DEPLOY_PORT}/api/health"
          verify_json_health "http://127.0.0.1/api/health" --header "Host: ${PRIMARY_DOMAIN}"
          verify_json_health "http://127.0.0.1/api/health" --header "Host: ${SECONDARY_DOMAIN}"

          if [ ! -f "/etc/letsencrypt/live/${PRIMARY_DOMAIN}/fullchain.pem" ]; then
            certbot certonly \
              --webroot \
              -w /var/www/certbot \
              -d "${PRIMARY_DOMAIN}" \
              -d "${SECONDARY_DOMAIN}" \
              --non-interactive \
              --agree-tos \
              --email "${SSL_EMAIL}"
          fi

          if [ -f "/etc/letsencrypt/live/${PRIMARY_DOMAIN}/fullchain.pem" ]; then
          cat > "$SITE_CONF" <<NGINX_HTTPS
          server {
              listen 80;
              server_name ${PRIMARY_DOMAIN} ${SECONDARY_DOMAIN};

              location /.well-known/acme-challenge/ {
                  root /var/www/certbot;
              }

              location / {
                  return 301 https://\$host\$request_uri;
              }
          }

          server {
              listen 443 ssl http2;
              server_name ${PRIMARY_DOMAIN} ${SECONDARY_DOMAIN};

              ssl_certificate /etc/letsencrypt/live/${PRIMARY_DOMAIN}/fullchain.pem;
              ssl_certificate_key /etc/letsencrypt/live/${PRIMARY_DOMAIN}/privkey.pem;

              location / {
                  proxy_pass http://127.0.0.1:${DEPLOY_PORT};
                  proxy_http_version 1.1;
                  proxy_set_header Host \$host;
                  proxy_set_header X-Real-IP \$remote_addr;
                  proxy_set_header X-Forwarded-For \$proxy_add_x_forwarded_for;
                  proxy_set_header X-Forwarded-Proto \$scheme;
              }
          }
          NGINX_HTTPS
            nginx -t
            systemctl reload nginx
          fi

          curl -fsS "http://127.0.0.1:${DEPLOY_PORT}/health" >/dev/null
          verify_json_health "http://127.0.0.1:${DEPLOY_PORT}/api/health"
          curl -fsSI -H "Host: ${PRIMARY_DOMAIN}" "http://127.0.0.1/" >/dev/null
          curl -fsSI -H "Host: ${SECONDARY_DOMAIN}" "http://127.0.0.1/" >/dev/null

          if [ -f "/etc/letsencrypt/live/${PRIMARY_DOMAIN}/fullchain.pem" ]; then
            verify_frontend_cache_headers "https://${PRIMARY_DOMAIN}"
            verify_json_health "https://${PRIMARY_DOMAIN}/api/health" --resolve "${PRIMARY_DOMAIN}:443:127.0.0.1"
            verify_json_health "https://${SECONDARY_DOMAIN}/api/health" --resolve "${SECONDARY_DOMAIN}:443:127.0.0.1"
          fi

          verify_auth_flow() {
            local domain="$1"
            local email="$2"
            local password="$3"
            local expected_role="$4"
            local cookie_file
            local login_body
            local profile_body
            local status

            cookie_file="$(mktemp)"
            login_body="$(mktemp)"
            profile_body="$(mktemp)"

            status="$(curl -ksS -o "$login_body" -w "%{http_code}" \
              --resolve "${domain}:443:127.0.0.1" \
              --cookie-jar "$cookie_file" \
              --header "Content-Type: application/json" \
              --data "{\"email\":\"${email}\",\"password\":\"${password}\"}" \
              "https://${domain}/api/auth/login")"
            [ "$status" = "200" ]
            grep -q "\"success\":true" "$login_body"
            grep -q "\"email\":\"${email}\"" "$login_body"

            status="$(curl -ksS -o "$profile_body" -w "%{http_code}" \
              --resolve "${domain}:443:127.0.0.1" \
              --cookie "$cookie_file" \
              "https://${domain}/api/auth/me")"
            [ "$status" = "200" ]
            grep -q "\"email\":\"${email}\"" "$profile_body"
            grep -q "\"role\":\"${expected_role}\"" "$profile_body"

            status="$(curl -ksS -o /dev/null -w "%{http_code}" \
              --resolve "${domain}:443:127.0.0.1" \
              --cookie "$cookie_file" \
              --cookie-jar "$cookie_file" \
              --request POST \
              "https://${domain}/api/auth/logout")"
            [ "$status" = "200" ]

            status="$(curl -ksS -o /dev/null -w "%{http_code}" \
              --resolve "${domain}:443:127.0.0.1" \
              --cookie "$cookie_file" \
              "https://${domain}/api/auth/me")"
            [ "$status" = "401" ]

            rm -f "$cookie_file" "$login_body" "$profile_body"
          }

          verify_auth_flow "${PRIMARY_DOMAIN}" "$(read_env_value BOOTSTRAP_ADMIN_EMAIL)" "$(read_env_value BOOTSTRAP_ADMIN_PASSWORD)" "ADMIN"
          verify_auth_flow "${PRIMARY_DOMAIN}" "$(read_env_value BOOTSTRAP_CUSTOMER_EMAIL)" "$(read_env_value BOOTSTRAP_CUSTOMER_PASSWORD)" "CUSTOMER"

          echo "Deploy concluido em ${PRIMARY_DOMAIN} e ${SECONDARY_DOMAIN}"
          REMOTE

      - name: Deployment summary
        run: |
          echo "Deploy concluido."
          echo "Frontend exposto internamente em 127.0.0.1:${DEPLOY_PORT}"
          echo "Dominios: https://${PRIMARY_DOMAIN} e https://${SECONDARY_DOMAIN}"
