name: Deploy Rebequi to VPS

on:
  push:
    branches:
      - main
      - production
  workflow_dispatch:

concurrency:
  group: deploy-vps
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup SSH key
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.VPS_PASSWORD }}" > ~/.ssh/vps_password
          chmod 600 ~/.ssh/vps_password

      - name: Sync code to VPS
        run: |
          # Instalar sshpass para autenticação com senha
          sudo apt-get update && sudo apt-get install -y sshpass rsync

          # Criar diretório no VPS
          sshpass -f ~/.ssh/vps_password ssh -o StrictHostKeyChecking=no ${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }} "mkdir -p /root/rebequi"

          # Verificar estrutura do projeto antes do rsync
          echo "=== Verificando estrutura localmente ==="
          ls -la apps/backend/src/
          ls -la apps/frontend/src/
          ls -la packages/shared/

          # Sincronizar código via rsync
          sshpass -f ~/.ssh/vps_password rsync -avz --delete \
            --exclude='.git' \
            --exclude='node_modules' \
            --exclude='dist' \
            --exclude='*.db' \
            --exclude='*.db-*' \
            --exclude='apps/backend/uploads/*' \
            --exclude='apps/backend/logs/*' \
            --exclude='apps/backend/.env' \
            --exclude='apps/frontend/.env' \
            --exclude='.env' \
            -e "ssh -o StrictHostKeyChecking=no" \
            ./ ${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }}:/root/rebequi/

          # Verificar se código foi copiado
          echo "=== Verificando estrutura na VPS após rsync ==="
          sshpass -f ~/.ssh/vps_password ssh -o StrictHostKeyChecking=no ${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }} "ls -la /root/rebequi/apps/"

      - name: Deploy to VPS
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          password: ${{ secrets.VPS_PASSWORD }}
          port: 22
          timeout: 600s
          command_timeout: 600s
          script: |
            set -e

            echo "=== Iniciando Deploy Rebequi E-commerce ==="

            # Diretório da aplicação
            APP_DIR="/root/rebequi"
            cd $APP_DIR

            # Parar containers existentes (SEM -v para preservar volumes)
            echo "Parando containers existentes..."
            docker-compose -f docker-compose.vps.yml down || true

            # Verificar e garantir que volumes críticos existam
            echo "=== Verificando volumes Docker ==="
            if ! docker volume ls | grep -q "rebequi.*postgres_data"; then
              echo "⚠️ Volume postgres_data não existe, será criado no próximo docker-compose up"
            else
              echo "✓ Volume postgres_data encontrado"
            fi

            # Criar arquivo .env para backend
            echo "Criando arquivo .env para backend..."
            cat > apps/backend/.env << 'EOF'
            # Node Environment
            NODE_ENV=production

            # Server
            PORT=3001
            HOST=0.0.0.0

            # Database
            DATABASE_URL="postgresql://rebequi:rebequi2024secure@postgres:5432/rebequi"

            # JWT
            JWT_SECRET=$(openssl rand -hex 32)
            JWT_EXPIRES_IN=7d

            # CORS
            ALLOWED_ORIGINS=*

            # File Upload
            MAX_FILE_SIZE=5242880
            UPLOAD_DIR=./uploads

            # Logging
            LOG_LEVEL=info
            EOF

            # Criar arquivo .env para frontend
            echo "Criando arquivo .env para frontend..."
            cat > apps/frontend/.env << 'EOF'
            VITE_API_BASE_URL=/api
            EOF

            # Adicionar BUILD_TIMESTAMP ao .env
            echo "BUILD_TIMESTAMP=$(date +%s)" >> apps/backend/.env

            # Limpar containers e imagens antigas (PRESERVAR volumes)
            echo "Limpando recursos antigos..."
            docker container prune -f || true
            docker image prune -af || true

            # Garantir BUILD_TIMESTAMP como variável de ambiente
            export BUILD_TIMESTAMP=$(date +%s)
            echo "BUILD_TIMESTAMP=${BUILD_TIMESTAMP}"

            # ===== VALIDAÇÃO PRÉ-BUILD =====
            echo "=== Validando estrutura do projeto antes do build ==="

            if [ ! -f "apps/backend/package.json" ]; then
              echo "❌ ERRO: apps/backend/package.json não encontrado!"
              exit 1
            fi
            echo "✓ backend/package.json encontrado"

            if [ ! -f "apps/frontend/package.json" ]; then
              echo "❌ ERRO: apps/frontend/package.json não encontrado!"
              exit 1
            fi
            echo "✓ frontend/package.json encontrado"

            if [ ! -d "apps/backend/src" ]; then
              echo "❌ ERRO: diretório apps/backend/src não encontrado!"
              exit 1
            fi
            echo "✓ Estrutura backend encontrada"

            if [ ! -d "apps/frontend/src" ]; then
              echo "❌ ERRO: diretório apps/frontend/src não encontrado!"
              exit 1
            fi
            echo "✓ Estrutura frontend encontrada"

            # Validar arquivos críticos do backend
            if [ ! -f "apps/backend/src/index.ts" ]; then
              echo "❌ ERRO: apps/backend/src/index.ts não encontrado!"
              exit 1
            fi
            echo "✓ backend index.ts encontrado"

            if [ ! -f "apps/backend/prisma/schema.prisma" ]; then
              echo "❌ ERRO: prisma/schema.prisma não encontrado!"
              exit 1
            fi
            echo "✓ prisma schema encontrado"

            echo "=== Todos os arquivos críticos validados ==="

            # Parar e remover containers antigos
            echo "Parando e removendo containers antigos (preservando volumes)..."
            docker-compose -f docker-compose.vps.yml down --remove-orphans || true
            docker rm -f rebequi-backend rebequi-frontend rebequi-postgres rebequi-nginx 2>/dev/null || true

            # Remover imagens antigas
            echo "Removendo imagens antigas..."
            docker rmi rebequi-backend rebequi-frontend 2>/dev/null || true
            docker rmi $(docker images -q 'rebequi*') 2>/dev/null || true

            # Build das imagens Docker
            echo "Construindo imagens Docker..."
            docker-compose -f docker-compose.vps.yml build --no-cache --pull || {
              echo "❌ Erro ao construir imagens Docker"
              exit 1
            }
            echo "✅ Imagens Docker construídas com sucesso"

            # Iniciar containers
            echo "Iniciando containers..."
            docker-compose -f docker-compose.vps.yml up -d --remove-orphans || {
              echo "❌ Erro ao iniciar containers"
              exit 1
            }
            echo "✅ Containers iniciados"

            # Aguardar containers iniciarem
            echo "Aguardando containers iniciarem..."
            sleep 20

            # Verificar status dos containers
            echo "=== Verificando status dos containers ==="
            docker-compose -f docker-compose.vps.yml ps

            # Verificar se containers estão rodando
            if ! docker ps | grep -q rebequi-postgres; then
              echo "❌ Container rebequi-postgres não está rodando!"
              echo "=== Logs do PostgreSQL ==="
              docker logs rebequi-postgres --tail=50
              exit 1
            fi
            echo "✓ Container rebequi-postgres está rodando"

            if ! docker ps | grep -q rebequi-backend; then
              echo "❌ Container rebequi-backend não está rodando!"
              echo "=== Logs do Backend ==="
              docker logs rebequi-backend --tail=100
              exit 1
            fi
            echo "✓ Container rebequi-backend está rodando"

            if ! docker ps | grep -q rebequi-frontend; then
              echo "❌ Container rebequi-frontend não está rodando!"
              echo "=== Logs do Frontend ==="
              docker logs rebequi-frontend --tail=50
              exit 1
            fi
            echo "✓ Container rebequi-frontend está rodando"

            if ! docker ps | grep -q rebequi-nginx; then
              echo "❌ Container rebequi-nginx não está rodando!"
              echo "=== Logs do Nginx ==="
              docker logs rebequi-nginx --tail=50
              exit 1
            fi
            echo "✓ Container rebequi-nginx está rodando"

            # Aguardar backend inicializar
            echo "Aguardando backend inicializar (30s)..."
            sleep 30

            # Executar migrations do Prisma
            echo "=== Executando migrations do Prisma ==="
            docker exec rebequi-backend sh -c "cd /app && npx prisma migrate deploy" || {
              echo "⚠️ Migrations falharam, tentando gerar Prisma client..."
              docker exec rebequi-backend sh -c "cd /app && npx prisma generate"
              docker exec rebequi-backend sh -c "cd /app && npx prisma migrate deploy"
            }
            echo "✅ Migrations executadas"

            # Executar seed (se necessário, pode falhar se já tiver dados)
            echo "=== Executando seed do banco de dados ==="
            docker exec rebequi-backend sh -c "cd /app && npm run prisma:seed" || {
              echo "⚠️ Seed falhou (pode já ter dados no banco)"
            }

            # ===== LOGS DE DIAGNÓSTICO =====
            echo "=== Logs do backend ==="
            docker logs rebequi-backend --tail=50

            echo "=== Logs do frontend ==="
            docker logs rebequi-frontend --tail=30

            echo "=== Logs do Nginx ==="
            docker logs rebequi-nginx --tail=30

            # ===== CONFIGURAR NGINX DO HOST =====
            echo "=== Configurando Nginx do host para porta 3120 ==="

            # Criar configuração do Nginx
            cat > /etc/nginx/sites-available/rebequi.conf << 'NGINX_EOF'
            # HTTP - Rebequi E-commerce na porta 3120
            server {
                listen 3120;
                listen [::]:3120;

                server_name _;

                # Logs
                access_log /var/log/nginx/rebequi-access.log;
                error_log /var/log/nginx/rebequi-error.log;

                # Limite de upload (para uploads de imagens de produtos)
                client_max_body_size 10M;
                client_body_timeout 60s;

                # Proxy para o container Nginx interno (porta 8080)
                location / {
                    proxy_pass http://127.0.0.1:8080;
                    proxy_http_version 1.1;
                    proxy_set_header Upgrade $http_upgrade;
                    proxy_set_header Connection 'upgrade';
                    proxy_set_header Host $host;
                    proxy_cache_bypass $http_upgrade;
                    proxy_set_header X-Real-IP $remote_addr;
                    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
                    proxy_set_header X-Forwarded-Proto $scheme;

                    # Timeouts
                    proxy_connect_timeout 60s;
                    proxy_send_timeout 60s;
                    proxy_read_timeout 60s;
                }
            }
            NGINX_EOF

            # Habilitar site
            ln -sf /etc/nginx/sites-available/rebequi.conf /etc/nginx/sites-enabled/

            # Testar e recarregar Nginx
            nginx -t && systemctl reload nginx
            echo "✅ Nginx do host configurado com sucesso na porta 3120"

            # Aguardar Nginx iniciar
            sleep 5

            # Verificar se está escutando nas portas
            echo "=== Verificando portas em uso ==="
            netstat -tulpn | grep nginx | grep ":3120 " || echo "⚠️ Nginx não encontrado na porta 3120"
            netstat -tulpn | grep nginx | grep ":8080 " || echo "⚠️ Container Nginx não encontrado na porta 8080"

            # ===== VERIFICAR HEALTH CHECK =====
            echo "=== Verificando health check ==="
            for i in {1..30}; do
              if curl -f http://localhost:3120/api/health 2>/dev/null; then
                echo "✅ Rebequi está rodando na porta 3120!"

                echo ""
                echo "=== Testando frontend na porta 3120 ==="
                curl -I http://localhost:3120 2>/dev/null | head -5

                echo ""
                echo "=== Testando API ==="
                curl http://localhost:3120/api/health 2>/dev/null | head -10

                echo ""
                echo "✅ Deploy concluído - aplicação está rodando!"
                echo "📍 Porta externa: 3120"
                echo "📍 Frontend interno: 3000"
                echo "📍 Backend interno: 3001"
                echo "📍 Nginx interno: 8080"
                echo "📦 Volumes persistentes:"
                echo "   - postgres_data: PostgreSQL database"
                echo "   - backend_uploads: Arquivos enviados"
                echo "   - backend_logs: Logs da aplicação"
                exit 0
              fi
              echo "Tentativa $i/30 falhou, aguardando 10s..."

              # Mostrar logs a cada 5 tentativas
              if [ $((i % 5)) -eq 0 ]; then
                echo "=== Logs recentes do backend ==="
                docker logs rebequi-backend --tail=20
                echo "=== Logs recentes do nginx ==="
                docker logs rebequi-nginx --tail=10
              fi

              sleep 10
            done

            echo "⚠️ Health check falhou após 30 tentativas"
            echo "=== Logs completos ==="
            docker-compose -f docker-compose.vps.yml logs --tail=100
            exit 1

      - name: Verify Deployment
        if: success()
        run: |
          echo "✅ Deploy concluído com sucesso!"
          echo "🌐 Rebequi E-commerce disponível na porta 3120"
          echo "📊 Health check: /api/health"
          echo "🐳 Containers rodando:"
          echo "   - rebequi-nginx (reverse proxy - 8080)"
          echo "   - rebequi-frontend (React SPA - 3000)"
          echo "   - rebequi-backend (Node.js API - 3001)"
          echo "   - rebequi-postgres (PostgreSQL - 5432)"
