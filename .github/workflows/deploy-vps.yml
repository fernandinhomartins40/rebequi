name: Deploy Rebequi to VPS

on:
  push:
    branches:
      - main
      - 'claude/**'  # Permite deploy de branches claude/*
  workflow_dispatch:  # Permite disparo manual via GitHub UI

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup SSH key
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.VPS_PASSWORD }}" > ~/.ssh/vps_password
          chmod 600 ~/.ssh/vps_password

      - name: Sync code to VPS
        run: |
          # Instalar sshpass para autenticação com senha
          sudo apt-get update && sudo apt-get install -y sshpass rsync

          # Criar diretório no VPS
          sshpass -f ~/.ssh/vps_password ssh -o StrictHostKeyChecking=no root@rebequi.com.br "mkdir -p /root/rebequi"

          # Verificar estrutura do projeto localmente antes do rsync
          echo "=== Verificando estrutura do projeto localmente ==="
          ls -la apps/backend/src/ || echo "❌ backend/src não encontrado"
          ls -la apps/frontend/src/ || echo "❌ frontend/src não encontrado"
          ls -la apps/backend/prisma/ || echo "❌ prisma não encontrado"
          ls -la packages/shared/ || echo "❌ shared não encontrado"

          # Sincronizar código via rsync
          sshpass -f ~/.ssh/vps_password rsync -avz --delete \
            --exclude='.git' \
            --exclude='node_modules' \
            --exclude='dist' \
            --exclude='*.db' \
            --exclude='*.db-*' \
            --exclude='apps/backend/uploads' \
            --exclude='.env' \
            -e "ssh -o StrictHostKeyChecking=no" \
            ./ root@rebequi.com.br:/root/rebequi/

          # Verificar se estrutura foi copiada
          echo "=== Verificando estrutura na VPS após rsync ==="
          sshpass -f ~/.ssh/vps_password ssh -o StrictHostKeyChecking=no root@rebequi.com.br "ls -la /root/rebequi/apps/backend/src/ || echo '❌ backend/src não copiado'"
          sshpass -f ~/.ssh/vps_password ssh -o StrictHostKeyChecking=no root@rebequi.com.br "ls -la /root/rebequi/apps/frontend/src/ || echo '❌ frontend/src não copiado'"

      - name: Deploy to VPS
        uses: appleboy/ssh-action@master
        with:
          host: rebequi.com.br
          username: root
          password: ${{ secrets.VPS_PASSWORD }}
          port: 22
          timeout: 300s
          command_timeout: 300s
          script: |
            set -e

            echo "=== Iniciando Deploy Rebequi ==="

            # Diretório da aplicação
            APP_DIR="/root/rebequi"

            # Parar containers existentes
            echo "Parando containers existentes..."
            cd $APP_DIR
            docker-compose -f docker-compose.vps.yml down || true

            echo "Verificando código sincronizado..."
            ls -la

            # Criar arquivo .env
            echo "Criando arquivo .env..."
            cat > .env << 'EOF'
            # Node.js
            NODE_ENV=production

            # Application
            PORT=3100

            # PostgreSQL
            POSTGRES_USER=rebequi
            POSTGRES_PASSWORD=rebequi2024secure
            POSTGRES_DB=rebequi

            # Database URL (PostgreSQL)
            DATABASE_URL=postgresql://rebequi:rebequi2024secure@postgres:5432/rebequi

            # JWT
            JWT_SECRET=rebequi-production-secret-$(date +%s)-$(openssl rand -hex 16)
            JWT_EXPIRES_IN=7d

            # CORS
            FRONTEND_URL=https://www.rebequi.com.br
            CORS_ORIGIN=https://www.rebequi.com.br
            ALLOWED_ORIGINS=https://www.rebequi.com.br,http://www.rebequi.com.br,https://rebequi.com.br,http://rebequi.com.br,http://72.60.10.108:3100,http://localhost:3100

            # Logs
            LOG_LEVEL=info
            EOF

            # Adicionar BUILD_TIMESTAMP ao .env
            echo "BUILD_TIMESTAMP=$(date +%s)" >> .env

            # Limpar containers e imagens antigas (PRESERVAR volumes do PostgreSQL)
            echo "Limpando recursos antigos..."
            docker container prune -f || true
            docker image prune -af || true

            # Garantir BUILD_TIMESTAMP como variável de ambiente ANTES do build
            export BUILD_TIMESTAMP=$(date +%s)
            echo "BUILD_TIMESTAMP=${BUILD_TIMESTAMP}"

            # ===== VALIDAÇÃO PRÉ-BUILD: Verificar estrutura do projeto =====
            echo "=== Validando estrutura do projeto antes do build ==="

            if [ ! -f "apps/backend/src/index.ts" ]; then
              echo "❌ ERRO: index.ts não encontrado!"
              exit 1
            fi
            echo "✓ index.ts encontrado"

            if [ ! -f "apps/backend/prisma/schema.prisma" ]; then
              echo "❌ ERRO: schema.prisma não encontrado!"
              exit 1
            fi
            echo "✓ schema.prisma encontrado"

            if [ ! -d "apps/frontend/src" ]; then
              echo "❌ ERRO: diretório frontend/src não encontrado!"
              exit 1
            fi
            echo "✓ Estrutura frontend encontrada"

            # Validar controllers e rotas
            if [ ! -f "apps/backend/src/controllers/productsController.ts" ]; then
              echo "❌ ERRO: productsController.ts não encontrado!"
              exit 1
            fi
            echo "✓ productsController encontrado"

            if [ ! -f "apps/backend/src/controllers/categoriesController.ts" ]; then
              echo "❌ ERRO: categoriesController.ts não encontrado!"
              exit 1
            fi
            echo "✓ categoriesController encontrado"

            if [ ! -f "apps/backend/src/controllers/authController.ts" ]; then
              echo "❌ ERRO: authController.ts não encontrado!"
              exit 1
            fi
            echo "✓ authController encontrado"

            if [ ! -f "apps/backend/src/routes/products.ts" ]; then
              echo "❌ ERRO: products.ts routes não encontrado!"
              exit 1
            fi
            echo "✓ products routes encontrado"

            if [ ! -f "apps/backend/src/routes/categories.ts" ]; then
              echo "❌ ERRO: categories.ts routes não encontrado!"
              exit 1
            fi
            echo "✓ categories routes encontrado"

            if [ ! -f "apps/backend/src/routes/auth.ts" ]; then
              echo "❌ ERRO: auth.ts routes não encontrado!"
              exit 1
            fi
            echo "✓ auth routes encontrado"

            # Validar middleware
            if [ ! -f "apps/backend/src/middleware/auth.ts" ]; then
              echo "❌ ERRO: auth middleware não encontrado!"
              exit 1
            fi
            echo "✓ auth middleware encontrado"

            if [ ! -f "apps/backend/src/middleware/upload.ts" ]; then
              echo "❌ ERRO: upload middleware não encontrado!"
              exit 1
            fi
            echo "✓ upload middleware encontrado"

            echo "=== Todos os arquivos críticos validados ==="

            # Build da imagem sem cache (BUILD_TIMESTAMP vem do export acima)
            echo "Construindo nova imagem..."
            docker-compose -f docker-compose.vps.yml build --no-cache --pull

            # Iniciar container
            echo "Iniciando container..."
            docker-compose -f docker-compose.vps.yml up -d

            # Aguardar PostgreSQL e aplicação iniciarem
            echo "Aguardando containers iniciarem..."
            sleep 30

            # ===== DIAGNÓSTICO: Verificar se aplicação está rodando =====
            echo "=== Verificando status no supervisord ==="
            docker exec rebequi-vps supervisorctl status || true

            echo "=== Logs do backend ==="
            docker exec rebequi-vps cat /var/log/backend.stdout.log || echo "Nenhum log stdout"
            docker exec rebequi-vps cat /var/log/backend.stderr.log || echo "Nenhum log stderr"

            echo "=== Logs do frontend ==="
            docker exec rebequi-vps cat /var/log/frontend.stdout.log || echo "Nenhum log frontend stdout"
            docker exec rebequi-vps cat /var/log/frontend.stderr.log || echo "Nenhum log frontend stderr"

            # Verificar status
            echo "Verificando status dos containers..."
            docker-compose -f docker-compose.vps.yml ps

            # Verificar logs do PostgreSQL
            echo "=== Logs do PostgreSQL ==="
            docker logs rebequi-postgres --tail=20

            # Verificar logs da aplicação
            echo "=== Logs da Aplicação ==="
            docker logs rebequi-vps --tail=100

            # Verificar se container está rodando
            if ! docker ps | grep -q rebequi-vps; then
              echo "❌ Container rebequi-vps não está rodando!"
              echo "=== Logs completos do container ==="
              docker logs rebequi-vps
              exit 1
            fi

            # ===== VALIDAÇÃO PÓS-BUILD: Verificar compilação =====
            echo "=== Validando compilação no container ==="

            # Verificar se o backend foi compilado
            if ! docker exec rebequi-vps test -f /app/apps/backend/dist/index.js; then
              echo "❌ ERRO: Backend não foi compilado no container!"
              echo "=== Listando arquivos em backend/dist ==="
              docker exec rebequi-vps ls -la /app/apps/backend/dist/ || true
              exit 1
            fi
            echo "✓ Backend compilado no container"

            # Verificar se o frontend foi compilado
            if ! docker exec rebequi-vps test -f /app/apps/frontend/dist/index.html; then
              echo "❌ ERRO: Frontend não foi compilado no container!"
              echo "=== Listando arquivos em frontend/dist ==="
              docker exec rebequi-vps ls -la /app/apps/frontend/dist/ || true
              exit 1
            fi
            echo "✓ Frontend compilado no container"

            # Aguardar aplicação inicializar completamente
            echo "=== Aguardando aplicação inicializar 10s ==="
            sleep 10

            # ===== CONFIGURAR NGINX PRIMEIRO =====
            echo "=== Configurando Nginx para portas 80, 443 e 3100 ==="

            # Criar configuração do Nginx
            cat > /etc/nginx/sites-available/rebequi.conf << 'NGINX_EOF'
            # Redirecionar HTTP para HTTPS
            server {
                listen 80;
                listen [::]:80;

                server_name rebequi.com.br www.rebequi.com.br;

                return 301 https://$server_name$request_uri;
            }

            # HTTPS - Servidor principal
            server {
                listen 443 ssl http2;
                listen [::]:443 ssl http2;

                server_name rebequi.com.br www.rebequi.com.br;

                # SSL - Let's Encrypt
                ssl_certificate /etc/letsencrypt/live/rebequi.com.br/fullchain.pem;
                ssl_certificate_key /etc/letsencrypt/live/rebequi.com.br/privkey.pem;
                include /etc/letsencrypt/options-ssl-nginx.conf;
                ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

                # Logs
                access_log /var/log/nginx/rebequi-access.log;
                error_log /var/log/nginx/rebequi-error.log;

                # Limite de upload
                client_max_body_size 10M;

                # API Backend
                location /api/ {
                    proxy_pass http://127.0.0.1:3101/api/;
                    proxy_http_version 1.1;
                    proxy_set_header Upgrade $http_upgrade;
                    proxy_set_header Connection 'upgrade';
                    proxy_set_header Host $host;
                    proxy_cache_bypass $http_upgrade;
                    proxy_set_header X-Real-IP $remote_addr;
                    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
                    proxy_set_header X-Forwarded-Proto $scheme;

                    proxy_connect_timeout 60s;
                    proxy_send_timeout 60s;
                    proxy_read_timeout 60s;
                }

                # Uploads estáticos
                location /uploads/ {
                    proxy_pass http://127.0.0.1:3101/uploads/;
                    proxy_http_version 1.1;
                    proxy_set_header Host $host;
                }

                # Health check
                location /health {
                    proxy_pass http://127.0.0.1:3101/health;
                    proxy_http_version 1.1;
                    proxy_set_header Host $host;
                }

                # Frontend
                location / {
                    proxy_pass http://127.0.0.1:8080/;
                    proxy_http_version 1.1;
                    proxy_set_header Upgrade $http_upgrade;
                    proxy_set_header Connection 'upgrade';
                    proxy_set_header Host $host;
                    proxy_cache_bypass $http_upgrade;
                    proxy_set_header X-Real-IP $remote_addr;
                    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
                    proxy_set_header X-Forwarded-Proto $scheme;
                }
            }

            # Porta 3100 - Acesso direto por IP
            server {
                listen 3100;
                listen [::]:3100;

                server_name _;

                # Logs
                access_log /var/log/nginx/rebequi-3100-access.log;
                error_log /var/log/nginx/rebequi-3100-error.log;

                # Limite de upload
                client_max_body_size 10M;

                # API Backend
                location /api/ {
                    proxy_pass http://127.0.0.1:3101/api/;
                    proxy_http_version 1.1;
                    proxy_set_header Upgrade $http_upgrade;
                    proxy_set_header Connection 'upgrade';
                    proxy_set_header Host $host;
                    proxy_cache_bypass $http_upgrade;
                    proxy_set_header X-Real-IP $remote_addr;
                    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
                    proxy_set_header X-Forwarded-Proto $scheme;

                    proxy_connect_timeout 60s;
                    proxy_send_timeout 60s;
                    proxy_read_timeout 60s;
                }

                # Uploads estáticos
                location /uploads/ {
                    proxy_pass http://127.0.0.1:3101/uploads/;
                    proxy_http_version 1.1;
                    proxy_set_header Host $host;
                }

                # Health check
                location /health {
                    proxy_pass http://127.0.0.1:3101/health;
                    proxy_http_version 1.1;
                    proxy_set_header Host $host;
                }

                # Frontend
                location / {
                    proxy_pass http://127.0.0.1:8080/;
                    proxy_http_version 1.1;
                    proxy_set_header Upgrade $http_upgrade;
                    proxy_set_header Connection 'upgrade';
                    proxy_set_header Host $host;
                    proxy_cache_bypass $http_upgrade;
                    proxy_set_header X-Real-IP $remote_addr;
                    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
                    proxy_set_header X-Forwarded-Proto $scheme;
                }
            }
            NGINX_EOF

            # Habilitar site
            ln -sf /etc/nginx/sites-available/rebequi.conf /etc/nginx/sites-enabled/

            # Testar e recarregar Nginx
            nginx -t && systemctl reload nginx
            echo "✅ Nginx configurado com sucesso nas portas 80, 443 e 3100"

            # Aguardar Nginx iniciar
            sleep 3

            # Verificar se está escutando nas portas corretas
            echo ""
            echo "=== Verificando portas em uso ==="
            netstat -tulpn | grep nginx | grep -E ":80 |:443 |:3100 "

            # ===== VERIFICAR HEALTH CHECK =====
            echo "=== Verificando health check ==="
            for i in {1..15}; do
              if curl -f http://localhost:3100/health; then
                echo "✅ Rebequi está rodando na porta 3100!"

                # Validar rota de produtos está acessível
                echo "=== Validando rota /api/products ==="
                if curl -f http://localhost:3100/api/products; then
                  echo "✅ Rota /api/products está acessível!"
                else
                  echo "⚠️ Rota /api/products retornou erro - pode ser normal se não houver produtos"
                fi

                # Validar rota de categorias
                echo "=== Validando rota /api/categories ==="
                if curl -f http://localhost:3100/api/categories; then
                  echo "✅ Rota /api/categories está acessível!"
                else
                  echo "⚠️ Rota /api/categories retornou erro"
                fi

                echo ""
                echo "=== Testando frontend porta 3100 ==="
                curl -I http://localhost:3100 | head -5

                echo ""
                echo "=== Testando HTTPS ==="
                curl -Ik https://rebequi.com.br | head -5

                echo ""
                echo "✅ Deploy concluído - aplicação está rodando!"
                echo "📍 Domínio: https://rebequi.com.br"
                echo "📍 IP:Porta: http://72.60.10.108:3100"
                exit 0
              fi
              echo "Tentativa $i/15 falhou, aguardando 10s..."

              # Mostrar logs a cada 3 tentativas
              if [ $((i % 3)) -eq 0 ]; then
                echo "=== Logs recentes ==="
                docker logs rebequi-vps --tail=30
              fi

              sleep 10
            done

            echo "⚠️ Health check falhou após 15 tentativas"
            echo "Logs completos:"
            docker-compose -f docker-compose.vps.yml logs
            exit 1

      - name: Verify Deployment
        if: success()
        run: |
          echo "✅ Deploy concluído com sucesso!"
          echo "🌐 Rebequi disponível em: https://www.rebequi.com.br"
          echo "🌐 Acesso alternativo: http://72.60.10.108:3100"
          echo "📊 Health check: http://72.60.10.108:3100/health"
