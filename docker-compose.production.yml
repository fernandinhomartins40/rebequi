services:
  postgres:
    image: postgres:16-alpine
    container_name: rebequi-postgres
    env_file:
      - .env.production
    volumes:
      - rebequi-postgres-data:/var/lib/postgresql/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 10s
      timeout: 5s
      retries: 10
    networks:
      - rebequi-network

  migrator:
    build:
      context: .
      dockerfile: apps/backend/Dockerfile
      target: builder
    container_name: rebequi-migrator
    env_file:
      - .env.production
    depends_on:
      postgres:
        condition: service_healthy
    command: ["sh", "-lc", "cd /app/apps/backend && npx prisma db push"]
    networks:
      - rebequi-network

  api:
    container_name: rebequi-api
    build:
      context: .
      dockerfile: apps/backend/Dockerfile
    env_file:
      - .env.production
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped
    volumes:
      - rebequi-uploads:/app/uploads
      - rebequi-logs:/app/logs
    healthcheck:
      test: ["CMD-SHELL", "wget --no-verbose --tries=1 --spider http://127.0.0.1:3000/api/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s
    networks:
      - rebequi-network

  web:
    container_name: rebequi-web
    build:
      context: .
      dockerfile: apps/frontend/Dockerfile
    depends_on:
      api:
        condition: service_healthy
    ports:
      - "127.0.0.1:3190:80"
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "wget --no-verbose --tries=1 --spider http://127.0.0.1/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 20s
    networks:
      - rebequi-network

volumes:
  rebequi-postgres-data:
    name: rebequi-postgres-data
  rebequi-uploads:
    name: rebequi-uploads
  rebequi-logs:
    name: rebequi-logs

networks:
  rebequi-network:
    name: rebequi-network
