version: '3.8'

services:
  # PostgreSQL Database
  postgres:
    image: postgres:16-alpine
    container_name: rebequi-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: rebequi
      POSTGRES_PASSWORD: rebequi123
      POSTGRES_DB: rebequi
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - rebequi-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U rebequi -d rebequi"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Backend API - Will be implemented later
  # backend:
  #   build:
  #     context: .
  #     dockerfile: apps/backend/Dockerfile
  #   container_name: rebequi-backend
  #   restart: unless-stopped
  #   environment:
  #     NODE_ENV: production
  #     PORT: 3000
  #     DATABASE_URL: postgresql://rebequi:rebequi123@postgres:5432/rebequi
  #     ALLOWED_ORIGINS: http://localhost,http://localhost:80
  #   ports:
  #     - "3000:3000"
  #   depends_on:
  #     postgres:
  #       condition: service_healthy
  #   networks:
  #     - rebequi-network
  #   healthcheck:
  #     test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:3000/health"]
  #     interval: 30s
  #     timeout: 10s
  #     retries: 3

  # Frontend Application
  frontend:
    build:
      context: .
      dockerfile: apps/frontend/Dockerfile
    container_name: rebequi-frontend
    restart: unless-stopped
    environment:
      VITE_API_URL: http://localhost/api
    ports:
      - "8080:80"
    networks:
      - rebequi-network
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:80/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  # Nginx Reverse Proxy
  nginx:
    build:
      context: .
      dockerfile: nginx/Dockerfile
    container_name: rebequi-nginx
    restart: unless-stopped
    ports:
      - "80:80"
    depends_on:
      - frontend
    networks:
      - rebequi-network
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:80"]
      interval: 30s
      timeout: 10s
      retries: 3

volumes:
  postgres_data:
    driver: local

networks:
  rebequi-network:
    driver: bridge
