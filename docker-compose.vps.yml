version: '3.8'

services:
  # PostgreSQL Database
  postgres:
    image: postgres:16-alpine
    container_name: rebequi-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: rebequi
      POSTGRES_PASSWORD: rebequi2024secure
      POSTGRES_DB: rebequi
      PGDATA: /var/lib/postgresql/data/pgdata
    volumes:
      - postgres_data:/var/lib/postgresql/data/pgdata
    networks:
      - rebequi-network
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U rebequi']
      interval: 10s
      timeout: 5s
      retries: 5

  # Backend API (Node.js + Express + Prisma)
  backend:
    build:
      context: .
      dockerfile: apps/backend/Dockerfile.vps
      args:
        BUILD_TIMESTAMP: ${BUILD_TIMESTAMP:-0}
    image: rebequi-backend:latest
    container_name: rebequi-backend
    restart: unless-stopped
    environment:
      NODE_ENV: production
      PORT: 3001
      DATABASE_URL: postgresql://rebequi:rebequi2024secure@postgres:5432/rebequi
    env_file:
      - apps/backend/.env
    volumes:
      - ./apps/backend/uploads:/app/uploads
      - ./apps/backend/logs:/app/logs
    networks:
      - rebequi-network
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ['CMD', 'wget', '--spider', '-q', 'http://localhost:3001/api/health']
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  # Frontend (React + Vite)
  frontend:
    build:
      context: .
      dockerfile: apps/frontend/Dockerfile.vps
      args:
        BUILD_TIMESTAMP: ${BUILD_TIMESTAMP:-0}
        VITE_API_BASE_URL: /api
    image: rebequi-frontend:latest
    container_name: rebequi-frontend
    restart: unless-stopped
    networks:
      - rebequi-network
    healthcheck:
      test: ['CMD', 'wget', '--spider', '-q', 'http://localhost:3000']
      interval: 30s
      timeout: 10s
      retries: 3

  # Nginx Reverse Proxy
  nginx:
    image: nginx:alpine
    container_name: rebequi-nginx
    restart: unless-stopped
    ports:
      - '8080:80'
    volumes:
      - ./nginx/nginx.vps.conf:/etc/nginx/nginx.conf:ro
      - ./apps/backend/uploads:/usr/share/nginx/html/uploads:ro
    networks:
      - rebequi-network
    depends_on:
      - backend
      - frontend
    healthcheck:
      test: ['CMD', 'wget', '--spider', '-q', 'http://localhost:80/api/health']
      interval: 30s
      timeout: 10s
      retries: 3

volumes:
  postgres_data:
    driver: local
    name: rebequi_postgres_data

networks:
  rebequi-network:
    driver: bridge
    name: rebequi-network
