version: '3.8'

services:
  # PostgreSQL Database
  postgres:
    image: postgres:16-alpine
    container_name: rebequi-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-rebequi}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-rebequi2024secure}
      POSTGRES_DB: ${POSTGRES_DB:-rebequi}
    ports:
      - "5433:5432"  # Porta externa diferente para evitar conflitos
    volumes:
      - rebequi_postgres_data:/var/lib/postgresql/data
    networks:
      - rebequi-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-rebequi} -d ${POSTGRES_DB:-rebequi}"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Aplicação Rebequi (Backend + Frontend em um único container)
  app:
    build:
      context: .
      dockerfile: Dockerfile.vps
      args:
        BUILD_TIMESTAMP: ${BUILD_TIMESTAMP:-0}
    container_name: rebequi-vps
    restart: unless-stopped
    environment:
      # Node.js
      NODE_ENV: production

      # Application
      PORT: ${PORT:-3100}

      # Database
      DATABASE_URL: ${DATABASE_URL}
      POSTGRES_USER: ${POSTGRES_USER:-rebequi}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-rebequi2024secure}
      POSTGRES_DB: ${POSTGRES_DB:-rebequi}

      # JWT
      JWT_SECRET: ${JWT_SECRET}
      JWT_EXPIRES_IN: ${JWT_EXPIRES_IN:-7d}

      # CORS
      FRONTEND_URL: ${FRONTEND_URL:-https://www.rebequi.com.br}
      CORS_ORIGIN: ${CORS_ORIGIN:-https://www.rebequi.com.br}
      ALLOWED_ORIGINS: ${ALLOWED_ORIGINS}

      # Logs
      LOG_LEVEL: ${LOG_LEVEL:-info}

    ports:
      - "3101:3000"  # Backend interno na porta 3000, exposto como 3101
      - "8080:8080"  # Frontend
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      # Persistir uploads
      - rebequi_uploads:/app/apps/backend/uploads
    networks:
      - rebequi-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s

volumes:
  rebequi_postgres_data:
    driver: local
  rebequi_uploads:
    driver: local

networks:
  rebequi-network:
    driver: bridge
