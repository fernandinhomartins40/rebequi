services:
  postgres:
    image: postgres:16-alpine
    container_name: rebequi-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-rebequi}
      POSTGRES_USER: ${POSTGRES_USER:-rebequi}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-rebequi2024secure}
      PGDATA: /var/lib/postgresql/data/pgdata
    volumes:
      - rebequi-postgres-data:/var/lib/postgresql/data/pgdata
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 10s
      timeout: 5s
      retries: 10
    networks:
      - rebequi-network

  migrator:
    image: rebequi-migrator:${RELEASE_VERSION:?RELEASE_VERSION is required}
    build:
      context: .
      dockerfile: apps/backend/Dockerfile
      target: builder
      args:
        RELEASE_VERSION: ${RELEASE_VERSION:?RELEASE_VERSION is required}
    container_name: rebequi-migrator
    restart: "no"
    environment: &backend-env
      NODE_ENV: ${NODE_ENV:-production}
      PORT: ${PORT:-3000}
      HOST: ${HOST:-0.0.0.0}
      DATABASE_URL: ${DATABASE_URL:-postgresql://rebequi:rebequi2024secure@postgres:5432/rebequi}
      JWT_SECRET: ${JWT_SECRET:-change-me-at-deploy-time-with-32-plus-chars}
      JWT_EXPIRES_IN: ${JWT_EXPIRES_IN:-7d}
      AUTH_COOKIE_NAME: ${AUTH_COOKIE_NAME:-rebequi_token}
      AUTH_COOKIE_SECURE: ${AUTH_COOKIE_SECURE:-true}
      AUTH_COOKIE_SAMESITE: ${AUTH_COOKIE_SAMESITE:-lax}
      AUTH_COOKIE_MAX_AGE_MS: ${AUTH_COOKIE_MAX_AGE_MS:-604800000}
      AUTH_COOKIE_PATH: ${AUTH_COOKIE_PATH:-/}
      ALLOWED_ORIGINS: ${ALLOWED_ORIGINS:-https://rebequi.com.br,https://www.rebequi.com.br}
      MAX_FILE_SIZE: ${MAX_FILE_SIZE:-5242880}
      UPLOAD_DIR: ${UPLOAD_DIR:-./uploads}
      LOG_LEVEL: ${LOG_LEVEL:-info}
      BOOTSTRAP_ADMIN_EMAIL: ${BOOTSTRAP_ADMIN_EMAIL:-admin@rebequi.com.br}
      BOOTSTRAP_ADMIN_PASSWORD: ${BOOTSTRAP_ADMIN_PASSWORD:-ChangeMe123!}
      BOOTSTRAP_ADMIN_NAME: ${BOOTSTRAP_ADMIN_NAME:-Administrador Rebequi}
      BOOTSTRAP_CUSTOMER_EMAIL: ${BOOTSTRAP_CUSTOMER_EMAIL:-cliente@rebequi.com.br}
      BOOTSTRAP_CUSTOMER_PASSWORD: ${BOOTSTRAP_CUSTOMER_PASSWORD:-Cliente123!}
      BOOTSTRAP_CUSTOMER_NAME: ${BOOTSTRAP_CUSTOMER_NAME:-Cliente de Teste}
    depends_on:
      postgres:
        condition: service_healthy
    command:
      [
        "sh",
        "-lc",
        "cd /app/apps/backend && if npx prisma migrate deploy; then echo 'Prisma migrate deploy concluido.'; else echo 'Fallback para prisma db push --accept-data-loss em banco legado.'; npx prisma db push --accept-data-loss; fi && npm run prisma:bootstrap",
      ]
    networks:
      - rebequi-network

  api:
    image: rebequi-api:${RELEASE_VERSION:?RELEASE_VERSION is required}
    build:
      context: .
      dockerfile: apps/backend/Dockerfile
      args:
        RELEASE_VERSION: ${RELEASE_VERSION:?RELEASE_VERSION is required}
    container_name: rebequi-api
    restart: unless-stopped
    environment: *backend-env
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - rebequi-uploads:/app/uploads
      - rebequi-logs:/app/logs
    healthcheck:
      test: ["CMD-SHELL", "wget --no-verbose --tries=1 --spider http://127.0.0.1:3000/api/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s
    networks:
      - rebequi-network

  web:
    image: rebequi-web:${RELEASE_VERSION:?RELEASE_VERSION is required}
    build:
      context: .
      dockerfile: apps/frontend/Dockerfile
      args:
        RELEASE_VERSION: ${RELEASE_VERSION:?RELEASE_VERSION is required}
    container_name: rebequi-web
    restart: unless-stopped
    depends_on:
      api:
        condition: service_healthy
    ports:
      - "127.0.0.1:${DEPLOY_PORT:-3190}:80"
    healthcheck:
      test: ["CMD-SHELL", "wget --no-verbose --tries=1 --spider http://127.0.0.1/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 20s
    networks:
      - rebequi-network

volumes:
  rebequi-postgres-data:
    name: rebequi-postgres-data
  rebequi-uploads:
    name: rebequi-uploads
  rebequi-logs:
    name: rebequi-logs

networks:
  rebequi-network:
    name: rebequi-network
